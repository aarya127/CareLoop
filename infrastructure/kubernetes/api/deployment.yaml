apiVersion: apps/v1
kind: Deployment
metadata:
  name: careloop-api
  namespace: careloop-staging
  labels:
    app: careloop-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: careloop-api
  template:
    metadata:
      labels:
        app: careloop-api
    spec:
      containers:
        - name: api
          image: careloop/api:staging
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - secretRef:
                name: careloop-secrets
            - configMapRef:
                name: careloop-config
          env:
            - name: NODE_ENV
              value: production
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      securityContext:
        fsGroup: 20001
