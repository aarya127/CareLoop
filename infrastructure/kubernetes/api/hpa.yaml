apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: careloop-api
  namespace: careloop-staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: careloop-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
