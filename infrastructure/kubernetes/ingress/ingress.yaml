apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: careloop-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
    - hosts:
        - careloop.example.com
      secretName: careloop-tls
  rules:
    - host: careloop.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: careloop-api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: careloop-web
                port:
                  number: 3000
