apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: careloop-public-ingress
  namespace: careloop-staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/server-snippet: |
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.staging.careloop.company.com
        - api.staging.careloop.company.com
      secretName: careloop-staging-tls
  rules:
    - host: app.staging.careloop.company.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: careloop-web
                port:
                  number: 3000
    - host: api.staging.careloop.company.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: careloop-api
                port:
                  number: 3001
