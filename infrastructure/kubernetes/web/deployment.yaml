apiVersion: apps/v1
kind: Deployment
metadata:
  name: careloop-web
  namespace: careloop-staging
  labels:
    app: careloop-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: careloop-web
  template:
    metadata:
      labels:
        app: careloop-web
    spec:
      containers:
        - name: web
          image: careloop/web:staging
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: careloop-config
                  key: API_URL
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      securityContext:
        fsGroup: 20001
