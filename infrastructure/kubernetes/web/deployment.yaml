apiVersion: apps/v1
kind: Deployment
metadata:
  name: careloop-web
  labels:
    app: careloop-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: careloop-web
  template:
    metadata:
      labels:
        app: careloop-web
    spec:
      containers:
        - name: web
          image: careloop/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: careloop-config
                  key: API_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
