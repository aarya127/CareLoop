apiVersion: v1
kind: Secret
metadata:
  name: careloop-secrets
  namespace: careloop-staging
type: Opaque
stringData:
  POSTGRES_DB: careloop
  POSTGRES_USER: careloop
  POSTGRES_PASSWORD: replace-me
  DATABASE_URL: postgresql://careloop:replace-me@postgres:5432/careloop
  REDIS_URL: redis://redis:6379
  JWT_SECRET: replace-me
  ENCRYPTION_KEY: replace-me
