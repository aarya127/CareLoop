apiVersion: apps/v1
kind: Deployment
metadata:
  name: careloop-worker
  namespace: careloop-staging
  labels:
    app: careloop-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: careloop-worker
  template:
    metadata:
      labels:
        app: careloop-worker
    spec:
      containers:
        - name: worker
          image: careloop/worker:staging
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: careloop-secrets
            - configMapRef:
                name: careloop-config
          env:
            - name: NODE_ENV
              value: production
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 20001
