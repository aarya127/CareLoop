# Nginx load-balancer config for local Docker Compose development.
# This distributes traffic across multiple `api` container replicas.
# Docker's internal DNS for a service named "api" automatically resolves to
# all replica IPs, so a single `server api:3001` line is sufficient — Docker
# handles round-robin at the DNS level.
#
# In production (Kubernetes), this file is NOT used. The Kubernetes Service
# object acts as the load balancer instead.

upstream api_backend {
    least_conn;
    server api:3001;   # Docker DNS resolves "api" to all replica IPs
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Propagate real client IP to the API
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Increase timeouts for long analytics queries
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    location / {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }
}
