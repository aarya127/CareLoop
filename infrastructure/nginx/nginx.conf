upstream web {
    server careloop-web.careloop-staging.svc.cluster.local:3000;
    keepalive 32;
}

upstream api {
    server careloop-api.careloop-staging.svc.cluster.local:3001;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

server {
    listen 80;
    server_name app.staging.careloop.company.com api.staging.careloop.company.com;

    # Redirect HTTP to HTTPS in production
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.staging.careloop.company.com;

    ssl_certificate     /etc/ssl/certs/tls.crt;
    ssl_certificate_key /etc/ssl/private/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "DENY"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 5m;
    limit_conn conn_per_ip 30;

    # Static Next.js app
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name api.staging.careloop.company.com;

    ssl_certificate     /etc/ssl/certs/tls.crt;
    ssl_certificate_key /etc/ssl/private/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 5m;
    limit_req zone=api_rate_limit burst=50 nodelay;
    limit_conn conn_per_ip 30;

    location / {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health check (no auth)
    location /health {
        proxy_pass http://api/health;
        access_log off;
    }
}
