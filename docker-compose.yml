version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: careloop
      POSTGRES_PASSWORD: careloop
      POSTGRES_DB: careloop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careloop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://careloop:careloop@postgres:5432/careloop?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: 1        # Increase to 2-3 when ready for horizontal web scaling

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    # No direct port binding: requests route through the nginx load balancer.
    # Expose 3001 for local dev only by adding "3001:3001" here.
    environment:
      DATABASE_URL: postgresql://careloop:careloop@postgres:5432/careloop?schema=public
      REDIS_URL: redis://redis:6379
      WEB_URL: http://localhost:3000
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2        # Run 2 stateless API replicas; rate limiting and session state are in Redis/Postgres

  # Nginx load balancer routes incoming traffic across API replicas.
  # In production (Kubernetes) this is replaced by a Kubernetes Service + Ingress.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "3001:80"        # External port 3001 → nginx → api replicas on :3001
    volumes:
      - ./infrastructure/nginx/docker-lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://careloop:careloop@postgres:5432/careloop?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2        # Workers are stateless; BullMQ distributes jobs across replicas automatically.

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: careloop
      MINIO_ROOT_PASSWORD: careloop_dev_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
