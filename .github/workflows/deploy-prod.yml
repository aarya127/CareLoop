name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. v1.2.3 or SHA)'
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://careloop.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -f infrastructure/docker/api.Dockerfile \
            -t $ECR_REGISTRY/careloop-api:$IMAGE_TAG \
            -t $ECR_REGISTRY/careloop-api:latest \
            .
          docker push $ECR_REGISTRY/careloop-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/careloop-api:latest

      - name: Build and push web image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -f infrastructure/docker/web.Dockerfile \
            -t $ECR_REGISTRY/careloop-web:$IMAGE_TAG \
            -t $ECR_REGISTRY/careloop-web:latest \
            .
          docker push $ECR_REGISTRY/careloop-web:$IMAGE_TAG
          docker push $ECR_REGISTRY/careloop-web:latest

      - name: Build and push worker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -f infrastructure/docker/worker.Dockerfile \
            -t $ECR_REGISTRY/careloop-worker:$IMAGE_TAG \
            -t $ECR_REGISTRY/careloop-worker:latest \
            .
          docker push $ECR_REGISTRY/careloop-worker:$IMAGE_TAG
          docker push $ECR_REGISTRY/careloop-worker:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl for production
        run: echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 --decode > ~/.kube/config

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: pnpm --filter @careloop/db exec prisma migrate deploy

      - name: Deploy to Kubernetes (production) — rolling update
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          kubectl set image deployment/careloop-api api=$ECR_REGISTRY/careloop-api:$IMAGE_TAG -n production
          kubectl set image deployment/careloop-web web=$ECR_REGISTRY/careloop-web:$IMAGE_TAG -n production
          kubectl set image deployment/careloop-worker worker=$ECR_REGISTRY/careloop-worker:$IMAGE_TAG -n production
          kubectl rollout status deployment/careloop-api -n production --timeout=300s
          kubectl rollout status deployment/careloop-web -n production --timeout=300s
          kubectl rollout status deployment/careloop-worker -n production --timeout=300s

      - name: Smoke test
        run: |
          sleep 15
          curl -f https://careloop.example.com/api/health || exit 1

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
