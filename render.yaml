services:
  # ── NestJS API ──────────────────────────────────────────────────────────────
  - type: web
    name: careloop-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: API_PORT
        value: "3001"
      - key: API_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: COOKIE_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SESSION_TTL_SECONDS
        value: "86400"
      - key: WEB_URL
        sync: false   # set to https://careloop-web.vercel.app (your Vercel URL)
      - key: APP_BASE_URL
        sync: false   # same as WEB_URL
      - key: SESSION_COOKIE
        value: "cl_session"
      # ── AWS S3 (document + EMR imaging storage) ──
      - key: STORAGE_BUCKET
        value: "careloop-documents"   # adjust to your bucket
      - key: STORAGE_REGION
        value: "us-east-1"            # adjust to your bucket region
      - key: STORAGE_ACCESS_KEY_ID
        sync: false                   # IAM user key: s3:PutObject/GetObject/DeleteObject on the bucket
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
    # NOTE: after deploy, apply the new EMR migration once:
    #   DATABASE_URL=<render-db-url> pnpm --filter @careloop/db exec prisma migrate deploy
    # (run from a machine/CI with the repo; the pruned runtime image has no prisma CLI)

  # ── BullMQ Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: careloop-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      # S3 access for document-cleanup (hard-delete removes objects from the bucket)
      - key: STORAGE_BUCKET
        value: "careloop-documents"
      - key: STORAGE_REGION
        value: "us-east-1"
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
