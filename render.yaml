services:
  # ── NestJS API ──────────────────────────────────────────────────────────────
  - type: web
    name: careloop-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: API_PORT
        value: "3001"
      - key: API_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: COOKIE_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SESSION_TTL_SECONDS
        value: "86400"
      - key: WEB_URL
        sync: false   # set to https://careloop-web.vercel.app (your Vercel URL)
      - key: APP_BASE_URL
        sync: false   # same as WEB_URL
      - key: SESSION_COOKIE
        value: "cl_session"

  # ── BullMQ Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: careloop-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
